name: Release

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || 'main' }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Show runtime versions
        run: node --version && npm --version && pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp nightly version
        if: github.event_name != 'release'
        id: nightly_version
        run: echo "version=$(pnpm --silent version:nightly)" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION=$(node --print "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ] && [ "$RELEASE_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Run validation suite
        run: pnpm check

      - name: Publish to npm
        if: github.event_name == 'release'
        run: npm publish --provenance --access public

      - name: Publish nightly package to npm
        if: github.event_name != 'release'
        run: npm publish --tag nightly --provenance --access public

      - name: Create nightly GitHub prerelease
        if: github.event_name != 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.nightly_version.outputs.version }}
          name: Nightly ${{ steps.nightly_version.outputs.version }}
          prerelease: true
          generate_release_notes: false
          body: |
            Automated nightly prerelease for `${{ steps.nightly_version.outputs.version }}`.

            - Commit: `${{ github.sha }}`
            - Workflow: `${{ github.workflow }}`
            - npm tag: `nightly`
