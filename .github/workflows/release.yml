name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Resolve version from tag
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"].strip()
          pyproject = Path("pyproject.toml")
          init_file = Path("src/ocwt/__init__.py")

          py_data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          current_version = str(py_data["project"]["version"])

          semver_match = re.fullmatch(r"v(\d+)\.(\d+)\.(\d+)", tag)
          if semver_match:
              next_version = ".".join(semver_match.groups())
          else:
              bump_match = re.fullmatch(r"(?:bump-)?(major|minor|patch)", tag)
              if not bump_match:
                  raise SystemExit(
                      f"Unsupported release tag '{tag}'. Use vX.Y.Z or bump-major/bump-minor/bump-patch."
                  )

              major, minor, patch = [int(part) for part in current_version.split(".")]
              bump = bump_match.group(1)
              if bump == "major":
                  major += 1
                  minor = 0
                  patch = 0
              elif bump == "minor":
                  minor += 1
                  patch = 0
              else:
                  patch += 1
              next_version = f"{major}.{minor}.{patch}"

          py_text = pyproject.read_text(encoding="utf-8")
          py_text, py_count = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{next_version}"',
              py_text,
              count=1,
          )
          if py_count != 1:
              raise SystemExit("Failed to update project.version in pyproject.toml")
          pyproject.write_text(py_text, encoding="utf-8")

          init_text = init_file.read_text(encoding="utf-8")
          init_text, init_count = re.subn(
              r'(?m)^__version__ = "[^"]+"$',
              f'__version__ = "{next_version}"',
              init_text,
              count=1,
          )
          if init_count != 1:
              raise SystemExit("Failed to update __version__ in src/ocwt/__init__.py")
          init_file.write_text(init_text, encoding="utf-8")

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"version={next_version}\n")
          print(f"Resolved release version: {next_version}")
          PY

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run checks
        run: |
          uv run ruff check .
          uv run ty check
          uv run pytest

      - name: Build distributions
        run: uv build

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
