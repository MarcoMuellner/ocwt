name: Nightly Release

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: nightly-release
  cancel-in-progress: false

jobs:
  publish-nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp nightly version
        id: version
        run: echo "version=$(pnpm --silent version:nightly)" >> "$GITHUB_OUTPUT"

      - name: Run validation suite
        run: pnpm check

      - name: Publish nightly package to npm
        run: npm publish --tag nightly --provenance --access public

      - name: Create nightly GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Nightly ${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: false
          body: |
            Automated nightly prerelease for `${{ steps.version.outputs.version }}`.

            - Commit: `${{ github.sha }}`
            - Workflow: `${{ github.workflow }}`
            - npm tag: `nightly`
